---
- name: Create user accounts
  ansible.builtin.user:
    name: "{{ linux_user }}"
    groups: "{{ linux_groups | default(omit) }}"
  loop: '{{ user_profiles }}'

- name: Add authorized keys
  ansible.posix.authorized_key:
    user: '{{ item.0.name }}'
    key: '{{ item.1 }}'
  with_subelements:
    - '{{ user_profiles }}'
    - authorized_keys
